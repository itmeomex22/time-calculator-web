<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บวกเวลา</title>

<style>
    body { font-family: Arial, sans-serif; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid black; padding: 8px; text-align: center; }
    input { width: 110px; text-align: center; }
    button { padding: 5px 10px; cursor: pointer; }
</style>
</head>

<body>

<h2>บวกเวลา (เวลาโลกจริง)</h2>

<table>
    <thead>
        <tr>
            <th>ชื่อสถานที่</th>
            <th>เวลาปัจจุบัน</th>
            <th>เพิ่มเวลา (นาที.วินาที)</th>
            <th>เวลาหลังบวก</th>
            <th>ลบ</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<br>
<button onclick="addRow()">➕ เพิ่มสถานที่</button>

<script>

// ==============================
// ====== DATA STORAGE =========
// ==============================

let locations = JSON.parse(localStorage.getItem("locations")) || [
    { name: "สถานที่ 1", new_time: "-" },
    { name: "สถานที่ 2", new_time: "-" }
];

function saveData() {
    localStorage.setItem("locations", JSON.stringify(locations));
}

// ==============================
// ====== SERVER TIME =========
// ==============================

let serverTimeOffset = 0;

async function syncServerTime() {
    try {
        const response = await fetch("https://worldtimeapi.org/api/timezone/Asia/Bangkok");
        const data = await response.json();

        const serverTime = new Date(data.datetime).getTime();
        const localTime = new Date().getTime();

        serverTimeOffset = serverTime - localTime;
        console.log("ซิงค์เวลาเรียบร้อย");
    } catch (err) {
        console.log("ใช้เวลาเครื่องแทน");
    }
}

function getAccurateTime() {
    return new Date(new Date().getTime() + serverTimeOffset);
}

// ==============================
// ====== TIME FORMAT =========
// ==============================

function formatTime(date) {
    let h = String(date.getHours()).padStart(2, '0');
    let m = String(date.getMinutes()).padStart(2, '0');
    let s = String(date.getSeconds()).padStart(2, '0');
    return `${h}.${m}.${s}`;
}

// ==============================
// ====== REALTIME CLOCK =======
// ==============================

function updateCurrentTime() {
    let now = getAccurateTime();
    let currentTime = formatTime(now);

    locations.forEach((_, index) => {
        let cell = document.getElementById(`current_${index}`);
        if (cell) {
            cell.innerText = currentTime;
        }
    });
}

setInterval(updateCurrentTime, 1000);

// ==============================
// ====== TABLE RENDER =========
// ==============================

function renderTable() {
    let tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    locations.forEach((item, index) => {
        tableBody.innerHTML += `
        <tr>
            <td>
                <input value="${item.name}"
                       onchange="changeName(${index}, this.value)">
            </td>
            <td id="current_${index}"></td>
            <td>
                <input placeholder="20 หรือ 20.30"
                       id="add_${index}">
                <button onclick="calculate(${index})">คำนวณ</button>
            </td>
            <td id="result_${index}">${item.new_time}</td>
            <td>
                <button onclick="deleteRow(${index})">ลบ</button>
            </td>
        </tr>
        `;
    });

    updateCurrentTime();
}

// ==============================
// ====== CALCULATE ============
// ==============================

function calculate(index) {
    let input = document.getElementById(`add_${index}`).value.split(".");
    let addMin = parseInt(input[0]) || 0;
    let addSec = input[1] ? parseInt(input[1]) : 0;

    let now = getAccurateTime();
    now.setMinutes(now.getMinutes() + addMin);
    now.setSeconds(now.getSeconds() + addSec);

    let result = formatTime(now);

    locations[index].new_time = result;
    saveData();

    document.getElementById(`result_${index}`).innerText = result;
}

// ==============================
// ====== EDIT / DELETE ========
// ==============================

function changeName(index, value) {
    locations[index].name = value;
    saveData();
}

function deleteRow(index) {
    locations.splice(index, 1);
    saveData();
    renderTable();
}

function addRow() {
    locations.push({ name: "สถานที่ใหม่", new_time: "-" });
    saveData();
    renderTable();
}

// ==============================
// ====== INIT =================
// ==============================

syncServerTime();
renderTable();

</script>

</body>
</html>
